 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0f0a 0%, #020603 100%);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px; /* Centered narrow card layout */
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            background: rgba(0, 10, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #0f6;
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #0c9;
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.2);
        }

        h2 {
            text-align: center;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0f6, #0c9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            color: #8f8;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group input {
            background: #021002;
            border: 1px solid #0f6;
            border-radius: 10px;
            padding: 10px 14px;
            color: #0f6;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0c9;
            box-shadow: 0 0 8px rgba(0, 255, 100, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0f6, #0c9);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 100, 0.3);
        }

        .message {
            margin-top: 1.5rem;
            padding: 12px;
            border-radius: 10px;
            background: rgba(0, 20, 0, 0.6);
            border-left: 3px solid #0f6;
            color: #0f6;
            font-size: 0.85rem;
            word-break: break-word;
            white-space: pre-wrap;
            display: none;
        }

        .message.error {
            border-left-color: #ff4757;
            color: #ff9f9f;
        }

        .info-text {
            text-align: center;
            color: #5f9;
            font-size: 0.7rem;
            margin-top: 1rem;
            border-top: 1px dashed #0f6;
            padding-top: 1rem;
            opacity: 0.7;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #010a01; }
        ::-webkit-scrollbar-thumb { background: #0f6; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN CARD -->
        <div class="card">
            <h2>🔐 LOGIN</h2>
            <form id="loginForm" method="POST" action="/login">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="Enter password to access" required>
                </div>
                <button type="submit">🚀 LOGIN</button>
            </form>
            <div id="loginMessage" class="message"></div>
            <div class="info-text">
                ⚡ Cloud Server Management Panel v3.1
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Handle Secure Login Handling
        const loginForm = document.getElementById('loginForm');
        const loginMsg = document.getElementById('loginMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(loginForm);
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    const text = await response.text();
                    loginMsg.style.display = 'block';
                    loginMsg.className = 'message error';
                    // Parse raw error strings securely or output fallback text
                    if (text.includes("banned")) {
                        loginMsg.textContent = '❌ Access Denied: You are banned from this service.';
                    } else if (text.includes("Invalid password")) {
                        loginMsg.textContent = '❌ Invalid system password specified.';
                    } else if (text.includes("User does not exist")) {
                        loginMsg.textContent = '❌ Account not found inside the terminal configuration database.';
                    } else {
                        loginMsg.textContent = '❌ Authentication failed. Check your credential values.';
                    }
                }
            } catch (err) {
                loginMsg.style.display = 'block';
                loginMsg.className = 'message error';
                loginMsg.textContent = '⚡ Core Connection Refused: ' + err.message;
            }
        });
    </script>
</body>
</html>
